<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ГдеСвета - Загрузка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ff6b9d, #ff8e53);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .splash-container {
      text-align: center;
      animation: fadeIn 1s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .logo {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 1s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .app-name {
      font-size: 32px;
      color: white;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    .tagline {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 40px;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .features {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .feature {
      background: rgba(255,255,255,0.2);
      padding: 15px 20px;
      border-radius: 15px;
      color: white;
      font-size: 14px;
      backdrop-filter: blur(10px);
      animation: slideUp 0.5s ease;
      animation-fill-mode: both;
    }
    
    .feature:nth-child(1) { animation-delay: 0.2s; }
    .feature:nth-child(2) { animation-delay: 0.4s; }
    .feature:nth-child(3) { animation-delay: 0.6s; }
    .feature:nth-child(4) { animation-delay: 0.8s; }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .feature-icon {
      font-size: 24px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo"></div>
    <div class="app-name">ГдеСвета</div>
    <div class="tagline">Твой семейный ежедневник</div>
    
    <div class="loader"></div>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">💼</div>
        <div>Работа</div>
      </div>
      <div class="feature">
        <div class="feature-icon">👨‍👩‍</div>
        <div>Семья</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✅</div>
        <div>Задачи</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📝</div>
        <div>Заметки</div>
      </div>
    </div>
  </div>
  
  <script>
    // Автоматический переход на главную страницу через 2 секунды
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
  </script>
</body>
</html>
